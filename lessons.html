<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh Sách Bài Học - Chinese Learning</title>
    <link rel="stylesheet" href="style.css" />
    <script src="theme.js" defer></script>
  </head>

  <body class="lessons-page">
    <div class="lessons-container">
      <div class="lessons-content">
        <h1 class="lessons-title" id="lessonsTitle">上听力课</h1>
        <p class="lessons-subtitle">Chọn mục để học</p>

        <button
          class="back-to-level-btn"
          onclick="window.location.href = 'choose-level.html'"
        >
          ← chọn lại môn học
        </button>

        <div class="pagination-bar">
          <button
            class="page-btn"
            id="prevPage"
            onclick="changePage(currentPage - 1)"
          >
            ← 1
          </button>
          <div class="page-indicators">
            <button
              class="page-indicator"
              id="page1Btn"
              onclick="changePage(1)"
            >
              Trang 1
            </button>
            <button
              class="page-indicator"
              id="page2Btn"
              onclick="changePage(2)"
            >
              Trang 2
            </button>
          </div>
          <button
            class="page-btn"
            id="nextPage"
            onclick="changePage(currentPage + 1)"
          >
            2 →
          </button>
        </div>

        <div class="lessons-grid" id="lessonsGrid"></div>
      </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const subject = params.get("subject") || "listening";
      const isWriting = subject === "writing";
      const isSpeaking = subject === "speaking";
      const isHanyu3 = subject === "hanyu3";
      const totalItems = isWriting ? 15 : isHanyu3 ? 10 : 12;
      const itemsPerPage = 12;
      const availableListeningLessons = new Set(
        Array.from({ length: 24 }, (_, idx) => idx + 1),
      );
      const availableSpeakingLessons = new Set(
        Array.from({ length: 12 }, (_, idx) => idx + 1),
      );
      const availableWritingLessons = new Set(
        Array.from({ length: 15 }, (_, idx) => idx + 1),
      );
      const availableHanyu3Lessons = new Set(
        Array.from({ length: 10 }, (_, idx) => idx + 1),
      );
      var currentPage = 1;

      function hasLessonData(lessonNumber) {
        if (isWriting) return availableWritingLessons.has(lessonNumber);
        if (isSpeaking) return availableSpeakingLessons.has(lessonNumber);
        if (isHanyu3) return availableHanyu3Lessons.has(lessonNumber);
        return availableListeningLessons.has(lessonNumber);
      }

      if (isWriting) {
        document.getElementById("lessonsTitle").textContent = "Môn Viết";
      } else if (isSpeaking) {
        document.getElementById("lessonsTitle").textContent = "口语";
      } else if (isHanyu3) {
        document.getElementById("lessonsTitle").textContent = "Giáo trình Hán ngữ quyển 3";
      }

      const lessonItems = Array.from({ length: totalItems }, (_, idx) => {
        const first = idx * 2 + 1;
        const second = first + 1;
        const pad = (n) => String(n).padStart(2, "0");
        const writingLesson = idx + 1;

        if (isWriting) {
          const unlocked = hasLessonData(writingLesson);
          return {
            title: `Bài ${writingLesson}`,
            unlocked,
            href: unlocked ? `lesson-options.html?lesson=${pad(writingLesson)}&subject=${subject}` : null,
            progress: unlocked ? "" : "Chưa có dữ liệu",
          };
        }

        if (isSpeaking) {
          const speakingLesson = idx + 1;
          const unlocked = hasLessonData(speakingLesson);
          return {
            title: `Bài ${pad(speakingLesson)}`,
            unlocked,
            href: unlocked ? `lesson-options.html?lesson=${pad(speakingLesson)}&subject=${subject}` : null,
            progress: unlocked ? "" : "Chưa có dữ liệu",
          };
        }

        if (isHanyu3) {
          const hanyuLesson = idx + 1;
          const unlocked = hasLessonData(hanyuLesson);
          return {
            title: `Bài ${pad(hanyuLesson)}`,
            unlocked,
            href: unlocked ? `lesson-options.html?lesson=${pad(hanyuLesson)}&subject=${subject}` : null,
            progress: unlocked ? "" : "Chưa có dữ liệu",
          };
        }

        const unlockedFirst = hasLessonData(first);
        const unlockedSecond = hasLessonData(second);
        const unlocked = unlockedFirst || unlockedSecond;
        let href = null;
        if (unlockedFirst) {
          href = `lesson-options.html?lesson=${pad(first)}&subject=${subject}`;
        } else if (unlockedSecond) {
          href = `lesson-options.html?lesson=${pad(second)}&subject=${subject}`;
        }

        return {
          title: `Bài ${pad(first)}-${pad(second)}`,
          lessons: [first, second],
          unlocked,
          href,
          progress: unlocked ? "" : "Chưa có dữ liệu",
        };
      });

      function updatePagination() {
        const totalPages = Math.ceil(lessonItems.length / itemsPerPage);
        const prevBtn = document.getElementById("prevPage");
        const nextBtn = document.getElementById("nextPage");
        const page1Btn = document.getElementById("page1Btn");
        const page2Btn = document.getElementById("page2Btn");

        prevBtn.disabled = currentPage === 1;
        nextBtn.disabled = currentPage === totalPages;
        page1Btn.classList.toggle("active-page", currentPage === 1);
        page2Btn.classList.toggle("active-page", currentPage === 2);
        page2Btn.style.display = totalPages > 1 ? "" : "none";
      }

      function changePage(page) {
        const totalPages = Math.ceil(lessonItems.length / itemsPerPage);
        currentPage = Math.max(1, Math.min(totalPages, page));
        renderPairs();
      }

      function renderPairs() {
        const grid = document.getElementById("lessonsGrid");
        const start = (currentPage - 1) * itemsPerPage;
        const pageItems = lessonItems.slice(start, start + itemsPerPage);
        grid.innerHTML = "";

        pageItems.forEach((pair) => {
          const button = document.createElement("button");
          button.className = pair.unlocked
            ? "lesson-btn unlocked"
            : "lesson-btn locked";

          if (pair.unlocked && pair.href) {
            button.addEventListener("click", () => {
              window.location.href = pair.href;
            });
          } else {
            button.disabled = true;
          }

          const label = document.createElement("span");
          label.className = "lesson-number";
          label.textContent = pair.title;
          button.appendChild(label);

          if (pair.progress) {
            const progress = document.createElement("span");
            progress.className = "lesson-progress";
            progress.textContent = pair.progress;
            button.appendChild(progress);
          }

          grid.appendChild(button);
        });

        updatePagination();
      }

      renderPairs();
    </script>
  </body>
</html>
