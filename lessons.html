  <body class="lessons-page">
    <div class="lessons-container">
      <div class="lessons-content">
        <h1 class="lessons-title" id="lessonsTitle">上听力课</h1>
        <p class="lessons-subtitle">Chọn mục để học</p>

        <button
          class="back-to-level-btn"
          onclick="window.location.href = 'choose-level.html'"
        >
          ← chọn lại môn học
        </button>

        <div class="pagination-bar">
          <button
            class="page-btn"
            id="prevPage"
            onclick="changePage(currentPage - 1)"
          >
            ← 1
          </button>
          <div class="page-indicators">
            <button
              class="page-indicator"
              id="page1Btn"
              onclick="changePage(1)"
            >
              Trang 1
            </button>
            <button
              class="page-indicator"
              id="page2Btn"
              onclick="changePage(2)"
            >
              Trang 2
            </button>
          </div>
          <button
            class="page-btn"
            id="nextPage"
            onclick="changePage(currentPage + 1)"
          >
            2 →
          </button>
        </div>

        <div class="lessons-grid" id="lessonsGrid"></div>
      </div>
    </div>

      function hasLessonData(lessonNumber) {
        if (isWriting) return availableWritingLessons.has(lessonNumber);
        if (isSpeaking) return availableSpeakingLessons.has(lessonNumber);
        if (isHanyu1) return availableHanyu1Lessons.has(lessonNumber);
        if (isHanyu3) return availableHanyu3Lessons.has(lessonNumber);
        return availableListeningLessons.has(lessonNumber);
      }

        document.getElementById("lessonsTitle").textContent = "中级写作（I）";
      } else if (isSpeaking) {
        document.getElementById("lessonsTitle").textContent = "口语";

        document.getElementById("lessonsTitle").textContent = "Giáo trình Hán ngữ quyển 1";
      } else if (isHanyu3) {
        document.getElementById("lessonsTitle").textContent = "Giáo trình Hán ngữ quyển 3";

        const first = idx * 2 + 1;
        const second = first + 1;

        const writingLesson = idx + 1;

        if (isWriting) {
          const unlocked = hasLessonData(writingLesson);

          return {
            title: lessonName ? `Bài ${writingLesson} - ${lessonName[0]}` : `Bài ${writingLesson}`,

            progress: unlocked ? "" : "Chưa có dữ liệu",

          return {

          title: lessonName ? `Bài ${pad(listeningLesson)} - ${lessonName[0]}` : `Bài ${pad(listeningLesson)}`,
          unlocked,

      function updatePagination() {
        const totalPages = Math.ceil(lessonItems.length / itemsPerPage);
        const prevBtn = document.getElementById("prevPage");
        const nextBtn = document.getElementById("nextPage");
        const page1Btn = document.getElementById("page1Btn");
        const page2Btn = document.getElementById("page2Btn");

        prevBtn.disabled = currentPage === 1;
        nextBtn.disabled = currentPage === totalPages;
        page1Btn.classList.toggle("active-page", currentPage === 1);
        page2Btn.classList.toggle("active-page", currentPage === 2);
        page2Btn.style.display = totalPages > 1 ? "" : "none";
      }

      function changePage(page) {
        const totalPages = Math.ceil(lessonItems.length / itemsPerPage);
        currentPage = Math.max(1, Math.min(totalPages, page));
        renderPairs();
      }

      function renderPairs() {
        const grid = document.getElementById("lessonsGrid");
        const start = (currentPage - 1) * itemsPerPage;
        const pageItems = lessonItems.slice(start, start + itemsPerPage);
        grid.innerHTML = "";

        pageItems.forEach((pair) => {
          const button = document.createElement("button");
          button.className = pair.unlocked
            ? "lesson-btn unlocked"
            : "lesson-btn locked";

          if (pair.unlocked && pair.href) {
            button.addEventListener("click", () => {
              window.location.href = pair.href;
            });
          } else {
            button.disabled = true;
          }

          const label = document.createElement("span");
          label.className = "lesson-number";
          label.textContent = pair.title;
          button.appendChild(label);

          if (pair.progress) {
            const progress = document.createElement("span");
            progress.className = "lesson-progress";
            progress.textContent = pair.progress;
            button.appendChild(progress);
          }

          grid.appendChild(button);
        });

        updatePagination();
      }

              ["\u4f1a\u8bae\u5385\u7684\u95e8\u5f00\u7740\u5462", "C\u1eeda ph\u00f2ng h\u1ed9i ngh\u1ecb \u0111ang m\u1edf \u0111\u1ea5y."],
            ],
            actionLabel: "H\u1ecdc b\u00e0i",
          },
        };
        const courseInfo = courseInfoMap[subject] || courseInfoMap.listening;

        document.body.classList.add("speaking-course-page");
        document.querySelector(".lessons-container").innerHTML = `
          <aside class="speaking-sidebar">
            <a class="speaking-logo" href="index.html">FTC</a>
            <nav class="speaking-nav" aria-label="Điều hướng khóa học">
              <a href="index.html">⌂ Trang chủ</a>
              <a class="is-active" href="${courseInfo.listHref}">▣ Học tập</a>
              <button disabled>Flashcard</button>
              <button disabled>Thi thử HSK</button>
              <button disabled>AI hội thoại</button>
              <button disabled>Từ vựng</button>
              <button disabled>Thống kê</button>
              <button disabled>Cài đặt</button>
            </nav>
          </aside>

          <main class="speaking-main">
            <div class="speaking-breadcrumb">
              <a href="index.html">← Học tập</a>
              <span>›</span>
              <span>${courseInfo.label}</span>
              <span>›</span>
              <strong>${courseInfo.title}</strong>
            </div>

            <section class="speaking-layout">
              <div class="speaking-primary">
                <header class="speaking-hero">
                  <div class="speaking-hero-art" aria-hidden="true">${courseInfo.icon}</div>
                  <div class="speaking-hero-copy">
                    <h1>${courseInfo.title}</h1>
                    <p>${courseInfo.subtitle}</p>
                    <span>Đã học 0/${totalItems} bài</span>
                    <div class="speaking-zero-progress" aria-hidden="true">
                      <span></span>
                    </div>
                  </div>
                  <div class="speaking-hero-stats">
                    <strong>${totalItems}</strong><span>bài học</span>
                  </div>
                </header>

                <div class="speaking-tabs" aria-label="Mục khóa học">
                  <button class="is-active" type="button">☷ Bài học</button>
                </div>

                <div class="speaking-lesson-list" id="speakingLessonList"></div>
              </div>

              <aside class="speaking-aside">
                <article class="speaking-side-card">
                  <h2>Tiến độ khóa học</h2>
                  <div class="speaking-ring"><strong>0%</strong></div>
                  <p>Đã học 0/${totalItems} bài</p>
                  <ul>
                    <li><span></span>0 bài đã hoàn thành</li>
                    <li><span></span>${totalItems} bài chưa học</li>
                  </ul>
                </article>

                <article class="speaking-side-card">
                  <h2>Gợi ý học hôm nay</h2>
                  <button type="button" disabled>Tiếp tục bài 01 <small>0%</small></button>
                  <button type="button" disabled>Ôn tập bài học <small>0 bài</small></button>
                  <button type="button" disabled>${courseInfo.actionLabel} <small>0</small></button>
                </article>
              </aside>
            </section>
          </main>
        `;

        const list = document.getElementById("speakingLessonList");
        lessonItems.forEach((item, index) => {
          const padLesson = String(index + 1).padStart(2, "0");
          const preset = courseInfo.lessons?.[index];
          const row = document.createElement("button");
          row.className = "speaking-lesson-row";
          row.type = "button";
          row.disabled = !item.unlocked || !item.href;
          row.innerHTML = `
            <span class="speaking-lesson-index">${padLesson}</span>
            <strong>${preset ? preset[0] : item.title}</strong>
            <em>${preset ? preset[1] : courseInfo.subtitle}</em>
            <b>0%</b>
          `;
          if (item.unlocked && item.href) {
            row.addEventListener("click", () => {
              window.location.href = item.href;
            });
          }
          list.appendChild(row);
        });
      }

      renderUnifiedCoursePage();
    </script>
  </body>
</html>
