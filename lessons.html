      function updatePagination() {
        const totalPages = Math.ceil(lessonItems.length / itemsPerPage);
        const prevBtn = document.getElementById("prevPage");
        const nextBtn = document.getElementById("nextPage");
        const page1Btn = document.getElementById("page1Btn");
        const page2Btn = document.getElementById("page2Btn");

        prevBtn.disabled = currentPage === 1;
        nextBtn.disabled = currentPage === totalPages;
        page1Btn.classList.toggle("active-page", currentPage === 1);
        page2Btn.classList.toggle("active-page", currentPage === 2);
        page2Btn.style.display = totalPages > 1 ? "" : "none";
      }

      function changePage(page) {
        const totalPages = Math.ceil(lessonItems.length / itemsPerPage);
        currentPage = Math.max(1, Math.min(totalPages, page));
        renderPairs();
      }

      function renderPairs() {
        const grid = document.getElementById("lessonsGrid");
        const start = (currentPage - 1) * itemsPerPage;
        const pageItems = lessonItems.slice(start, start + itemsPerPage);
        grid.innerHTML = "";

        pageItems.forEach((pair) => {
          const button = document.createElement("button");
          button.className = pair.unlocked
            ? "lesson-btn unlocked"
            : "lesson-btn locked";

          if (pair.unlocked && pair.href) {
            button.addEventListener("click", () => {
              window.location.href = pair.href;
            });
          } else {
            button.disabled = true;
          }

          const label = document.createElement("span");
          label.className = "lesson-number";
          label.textContent = pair.title;
          button.appendChild(label);

          if (pair.progress) {
            const progress = document.createElement("span");
            progress.className = "lesson-progress";
            progress.textContent = pair.progress;
            button.appendChild(progress);
          }

          grid.appendChild(button);
        });

        updatePagination();
      }
