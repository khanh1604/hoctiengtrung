      function splitIntoParts(items, partCount) {
        const base = Math.floor(items.length / partCount);
        const extra = items.length % partCount;
        let start = 0;

        return Array.from({ length: partCount }, (_, idx) => {
          const size = base + (idx < extra ? 1 : 0);
          const end = start + size;
          const part = items.slice(start, end);
          start = end;
          return part;
        }).filter((part) => part.length > 0);
      }

      function replaceKnownMojibake(value) {
        return String(value)
          .replaceAll("\u00e2\u2020\u0090", "←")
          .replaceAll("\u00e2\u2020\u0092", "→")
          .replaceAll("\u00e2\u20ac\u00ba", "›")
          .replaceAll("\u00e2\u2013\u00a3", "▣")
          .replaceAll("\u00e2\u2014\u017d", "◎")
          .replaceAll("\u00e2\u0161\u00a1", "⚡")
          .replaceAll("\u00e2\u0152\u201a", "⌂")
          .replaceAll("\u00f0\u0178\u017d\u2122", "🎙")
          .replaceAll("\u00f0\u0178\u201c\u2013", "📖")
          .replaceAll("\u00f0\u0178\u017d\u00a7", "🎧")
          .replaceAll("\u00e2\u0153\u008d\u00ef\u00b8\u008f", "✍️");
      }

      function decodeMojibakeOnce(value) {
        const windows1252Bytes = {
          "€": 0x80,
          "‚": 0x82,
          "ƒ": 0x83,
          "„": 0x84,
          "…": 0x85,
          "†": 0x86,
          "‡": 0x87,
          "ˆ": 0x88,
          "‰": 0x89,
          "Š": 0x8a,
          "‹": 0x8b,
          "Œ": 0x8c,
          "Ž": 0x8e,
          "‘": 0x91,
          "’": 0x92,
          "“": 0x93,
          "”": 0x94,
          "•": 0x95,
          "–": 0x96,
          "—": 0x97,
          "˜": 0x98,
          "™": 0x99,
          "š": 0x9a,
          "›": 0x9b,
          "œ": 0x9c,
          "ž": 0x9e,
          "Ÿ": 0x9f,
        };

        try {
          const bytes = Uint8Array.from(Array.from(value), (char) => {
            if (windows1252Bytes[char] !== undefined) return windows1252Bytes[char];
            const code = char.charCodeAt(0);
            return code <= 255 ? code : code & 255;
          });
          const decoded = new TextDecoder("utf-8").decode(bytes);
          return decoded.includes("\uFFFD") ? value : decoded;
        } catch (error) {
          return value;
        }
      }

      function fixMojibakeText(text) {
        let value = replaceKnownMojibake(text ?? "");
        const mojibakePattern = /(\u00c3|\u00c2|\u00c4|\u00c6|\u00e2|\u00f0\u0178|\u00e5|\u00e7|\u00ef\u00bc|\u00e1[\u00ba\u00bb]|\u00e8[\u00af-\u00bf])/;
        if (!mojibakePattern.test(value)) return value;

        for (let i = 0; i < 3; i += 1) {
          const decoded = replaceKnownMojibake(decodeMojibakeOnce(value));
          if (!decoded || decoded === value) break;
          value = decoded;
          if (!mojibakePattern.test(value)) break;
        }

        if (mojibakePattern.test(value)) {
          value = value
            .split(/(\s+)/)
            .map((token) => {
              if (!mojibakePattern.test(token)) return token;

              let fixedToken = token;
              for (let i = 0; i < 3; i += 1) {
                const decoded = replaceKnownMojibake(decodeMojibakeOnce(fixedToken));
                if (!decoded || decoded === fixedToken) break;
                fixedToken = decoded;
                if (!mojibakePattern.test(fixedToken)) break;
              }
              return fixedToken;
            })
            .join("");
        }

        return replaceKnownMojibake(value);
      }

      function fixMojibakeIn(root = document.body) {
        if (!root) return;
        document.title = fixMojibakeText(document.title);

        const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
        const textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);

        textNodes.forEach((node) => {
          const fixed = fixMojibakeText(node.nodeValue);
          if (fixed !== node.nodeValue) node.nodeValue = fixed;
        });

        if (!root.querySelectorAll) return;
        root.querySelectorAll("[placeholder],[aria-label],[title]").forEach((element) => {
          ["placeholder", "aria-label", "title"].forEach((attr) => {
            if (!element.hasAttribute(attr)) return;
            const current = element.getAttribute(attr);
            const fixed = fixMojibakeText(current);
            if (fixed !== current) element.setAttribute(attr, fixed);
          });
        });
      }

      function installMojibakeFixer() {
        const root = document.body;
        if (!root || root.dataset.mojibakeFixerInstalled === "true") return;
        root.dataset.mojibakeFixerInstalled = "true";

        let scheduled = false;
        const observer = new MutationObserver(() => {
          if (scheduled) return;
          scheduled = true;
          requestAnimationFrame(() => {
            fixMojibakeIn(root);
            scheduled = false;
          });
        });

        observer.observe(root, {
          attributes: true,
          childList: true,
          characterData: true,
          subtree: true,
        });
        fixMojibakeIn(root);
      }

      function setReviewHeader(title, subtitle = "Chọn bài để bắt đầu") {
        const titleEl = document.getElementById("reviewTitle");
        const subtitleEl = document.getElementById("reviewSubtitle") || document.querySelector(".review-subtitle");
        const breadcrumbTitle = document.getElementById("reviewBreadcrumbTitle");
        const padLesson = String(Number(lesson)).padStart(2, "0");

        if (titleEl) titleEl.textContent = title;
        if (subtitleEl) subtitleEl.textContent = subtitle;
        if (breadcrumbTitle) {
          breadcrumbTitle.textContent = title;
          breadcrumbTitle.href = `review.html?lesson=${padLesson}${subjectParam}${contentParam}`;
        }
        fixMojibakeIn(document.querySelector(".review-container"));
      }

      const listeningSectionOrder = ["4", "4-1", "4-2", "5-1", "5-2", "6-1", "6-2"];

      function getWritingGrammarItems(data) {
        const lessonKey = String(Number(lesson));
        const grammar = data.grammar || data.grammarTests || {};
        const items = grammar[lesson] || grammar[lessonKey] || [];
        return Array.isArray(items)
          ? items.filter((item) => item && !item.partOfSpeech)
          : [];
      }

      function getWritingStructureItems(data) {
        const lessonKey = String(Number(lesson));
        const structure = data.structure || data.structureTests || {};
        const items = structure[lesson] || structure[lessonKey] || [];
        if (Array.isArray(items) && items.length) return items;

        return getWritingGrammarItems(data);
      }

      function getWritingExampleItems(data) {
        const lessonKey = String(Number(lesson));
        const examples = data.examples || data.exampleTests || {};
        return examples[lesson] || examples[lessonKey] || [];
      }

      function splitWritingItemsIntoTests(items) {
        if (Array.isArray(items)) {
          if (Array.isArray(items[0])) return items;
          const groupSize = 20;
          return Array.from({ length: Math.ceil(items.length / groupSize) }, (_, idx) =>
            items.slice(idx * groupSize, (idx + 1) * groupSize),
          );
        }

        return Object.keys(items || {})
              .sort((a, b) => Number(a) - Number(b))
              .map((key) => items[key]);
      }

      function splitWritingExamplesIntoReadings(items) {
        if (!Array.isArray(items)) {
          return Object.keys(items || {})
            .sort((a, b) => Number(a) - Number(b))
            .map((key) => items[key]);
        }
        if (Array.isArray(items[0])) return items;
        if (!items.length) return [];

        const readingCount = 9;
        const groupSize = Math.ceil(items.length / readingCount);
        return Array.from({ length: readingCount }, (_, idx) =>
          items.slice(idx * groupSize, (idx + 1) * groupSize),
        ).filter((group) => group.length);
      }

      let writingReferenceGroups = [];
      let writingReferenceWords = [];

      function getWritingReferenceTitle(group, index) {
        const first = Array.isArray(group) ? group[0] : null;
        return first?.title || first?.heading || `Bài đọc hiểu ${String(index + 1).padStart(2, "0")}`;
      }

      function getWritingReferenceText(group, key) {
        return (Array.isArray(group) ? group : [])
          .map((item) => item?.[key])
          .filter(Boolean)
          .join("\n");
      }

      function renderWritingReferenceReader(testNumber = 1) {
        const index = Math.max(0, Number(testNumber) - 1);
        const group = writingReferenceGroups[index] || [];
        const currentTitle = getWritingReferenceTitle(group, index);
        const chineseText = getWritingReferenceText(group, "chinese");
        const pinyinText = getWritingReferenceText(group, "pinyin");
        const vietnameseText = getWritingReferenceText(group, "vietnamese");
        const learnedCount = Number(localStorage.getItem(`writingReferenceRead-${lesson}`) || 0);
        const noteKey = `writingReferenceNote-${lesson}-${testNumber}`;
        const noteValue = localStorage.getItem(noteKey) || "";
        const writingWords = writingReferenceWords.slice(0, 8);

        setReviewHeader("Tham khảo đoạn văn", "9 bài văn mẫu - chữ Hán - pinyin - nghĩa Việt");
        const grid = document.getElementById("reviewGrid");
        grid.className = "writing-reference-reader";
        grid.innerHTML = `
          <aside class="writing-reference-list">
            ${writingReferenceGroups

                const read = localStorage.getItem(`writingReferenceRead-${lesson}-${idx + 1}`) === "1";
                return `
                  <button class="writing-reference-item ${idx === index ? "is-active" : ""}" type="button" data-index="${idx}">
                    <span>${String(idx + 1).padStart(2, "0")}</span>
                    <strong>${escapeHtml(itemTitle)}</strong>
                    <em>${read ? "đã đọc" : "mới"}</em>

                `;
              })
              .join("")}
          </aside>

            <div class="writing-reference-hero">
              <div>
                <span>Tham khảo đoạn văn</span>

                <p>${escapeHtml(getWritingLessonName()?.[0] || "中级写作（I）")}</p>
              </div>
              <div class="writing-reference-stats">
                <strong>${writingReferenceGroups.length || 9}</strong><small>bài</small>
                <strong>${Math.max(learnedCount, 0)}</strong><small>đã đọc</small>
              </div>
            </div>
            <article class="writing-reference-card">
              <div class="writing-reference-toolbar">
                <button class="writing-reference-play" type="button">▶</button>
                <button class="writing-reference-mark" type="button">Lưu bài</button>
                <label><input id="toggleReferencePinyin" type="checkbox" checked /> Hiện pinyin</label>
                <label><input id="toggleReferenceMeaning" type="checkbox" checked /> Hiện nghĩa Việt</label>
              </div>
              <section>
                <h3>Bài văn</h3>
                <div class="writing-reference-chinese">${renderReadingText(chineseText || "Chưa có dữ liệu bài văn.")}</div>
              </section>
              <section class="writing-reference-pinyin">
                <h3>Pinyin</h3>
                <div>${renderReadingText(pinyinText || "Đang bổ sung.")}</div>
              </section>
              <section class="writing-reference-meaning">
                <h3>Nghĩa Việt</h3>
                <div>${renderReadingText(vietnameseText || "Đang bổ sung.")}</div>
              </section>
            </article>
          </section>
          <aside class="writing-reference-side">
            <article>
              <div class="writing-reference-side-head">
                <h3>Ghi chú của tôi</h3>
                <button class="writing-reference-save-note" type="button">Lưu</button>
              </div>
              <textarea id="writingReferenceNote" placeholder="Ghi lại mẫu câu hay, từ mới, ý cần nhớ...">${escapeHtml(noteValue)}</textarea>
            </article>
            <article>
              <div class="writing-reference-side-head">
                <h3>Từ mới trong bài</h3>
              </div>
              <ol class="writing-reference-words">
                ${

                    ? writingWords
                        .map(
                          (word) => `

                              <strong>${escapeHtml(word.chinese)}</strong>
                              <span>${escapeHtml(word.pinyin || "")}</span>
                              <small>${escapeHtml(word.vietnamese || word.meaning || "")}</small>
                            </li>
                          `,

      function parseTabSeparatedVocabulary(text) {
        return String(text || "")
          .split(/\r?\n/)
          .map((line) => line.trim())
          .filter(Boolean)
          .map((line) => {
            const parts = line.split(/\t+/);
            return {
              chinese: parts[0] || "",
              pinyin: parts[1] || "",
              vietnamese: parts[2] || "",
            };
          });
      }

      function splitIntoFixedGroups(items, groupSize) {
        const groups = [];
        for (let i = 0; i < items.length; i += groupSize) {
          groups.push(items.slice(i, i + groupSize));
        }
        return groups;
      }

      function splitIntoParts(items, partCount) {
        const groups = [];
        const size = Math.ceil((items || []).length / partCount);
        for (let i = 0; i < partCount; i++) {
          groups.push((items || []).slice(i * size, (i + 1) * size));
        }
        return groups;
      }

      function escapeHtml(text) {
        return String(text || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      const preferredChineseVoiceNames = [
        "zh-cn-xiaoxiaoneural",
        "xiaoxiaoneural",
        "microsoft xiaoxiao",
        "xiaoxiao",
        "zh-cn-xiaonineural",
        "xiaonineural",
        "microsoft xiaoni",
        "xiaoni",
        "google 普通话",
        "google mandarin",
        "google chinese"
      ];

      function scoreChineseVoice(voice) {
        const text = `${voice.name || ""} ${voice.voiceURI || ""} ${voice.lang || ""}`.toLowerCase();
        if (!voice.lang || !voice.lang.toLowerCase().startsWith("zh")) return -1;
        const preferredIndex = preferredChineseVoiceNames.findIndex((name) => text.includes(name));
        if (preferredIndex >= 0) return 1000 - preferredIndex * 20;
        if (text.includes("neural")) return 760;
        if (text.includes("microsoft")) return 700;
        if (text.includes("google")) return 680;
        if (voice.lang.toLowerCase() === "zh-cn") return 620;
        return 500;
      }

      function getBestChineseVoice() {
        return window.speechSynthesis
          .getVoices()
          .filter((voice) => scoreChineseVoice(voice) >= 0)
          .sort((a, b) => scoreChineseVoice(b) - scoreChineseVoice(a))[0] || null;
      }

      function splitSpeechText(text, maxLength = 90) {
        const parts = String(text || "")
          .replace(/\s+/g, " ")
          .match(/[^。！？!?；;，,]+[。！？!?；;，,]?/g) || [String(text || "")];
        const chunks = [];
        let current = "";
        parts.forEach((part) => {
          const next = `${current}${part}`;
          if (next.length > maxLength && current) {
            chunks.push(current);
            current = part;
          } else {
            current = next;
          }
        });
        if (current) chunks.push(current);
        return chunks.map((chunk) => chunk.trim()).filter(Boolean);
      }

      function primeSpeechSynthesis() {
        if (!("speechSynthesis" in window)) return;
        try {
          window.speechSynthesis.resume();
          window.speechSynthesis.getVoices();
        } catch (e) {}
      }

      document.addEventListener("pointerdown", primeSpeechSynthesis, { once: true, passive: true });
      document.addEventListener("touchstart", primeSpeechSynthesis, { once: true, passive: true });

      function speakChinese(text, options = {}) {
        if (!text) return;
        const bestVoice = "speechSynthesis" in window ? getBestChineseVoice() : null;
        if (window.FTCTTS?.speak) {
          window.FTCTTS.speak(text, {
            lang: bestVoice?.lang || "zh-CN",
            voice: bestVoice,
            rate: Number(options.rate) || 0.86,
            pitch: 1.03,
          });
          return;
        }

        const synth = window.speechSynthesis;
        const chunks = splitSpeechText(text);
        let index = 0;

        const speakNext = () => {
          if (index >= chunks.length) return;
          const utterance = new SpeechSynthesisUtterance(chunks[index]);
          index += 1;
          utterance.lang = bestVoice?.lang || "zh-CN";
          utterance.voice = bestVoice || null;
          utterance.rate = Number(options.rate) || 0.86;
          utterance.pitch = 1.03;
          utterance.volume = 1;
          utterance.onend = speakNext;
          utterance.onerror = speakNext;
          synth.speak(utterance);
        };

        try {
          synth.cancel();
          synth.resume();
          synth.getVoices();
          speakNext();
        } catch (e) {}
      }

      function getSpeakingStructureItems(data) {
        if (data.__rawText) return parseTabSeparatedVocabulary(data.__rawText || "");
        return data.grammar || data.structure || [];
      }

      function getSpeakingWordItems(data) {
        if (data.__rawText) return [];
        return data.vocabulary || data.words || data.newWords || [];
      }

      function getSpeakingParagraphGroups(data) {
        const items = data.paragraph || [];
        if (!Array.isArray(items) || !items.length) return [];
        if (Array.isArray(items[0])) return items;
        if (items[0] && (Array.isArray(items[0].lines) || items[0].title || items[0].type)) return items;
        if (subject === "hanyu3") return splitIntoParts(items, 3);
        return [items];
      }

      function isReadingPassage(group) {
        if (group && !Array.isArray(group) && group.type) {
          return group.type === "reading";
        }
        return Boolean(
            group &&
            !Array.isArray(group) &&
            !Array.isArray(group.value) &&
            (Array.isArray(group.lines) || group.chinese),
        );
      }

      function getParagraphGroupLines(group) {
        if (Array.isArray(group)) return group;
        if (group && Array.isArray(group.value)) return group.value;
        if (group && Array.isArray(group.lines)) return group.lines;
        return [];
      }

      function getParagraphGroupTotal(group) {
        if (isReadingPassage(group)) {
          return Array.isArray(group.lines) ? group.lines.length : 1;
        }
        return getParagraphGroupLines(group).length;
      }

      function getParagraphGroupTitle(group, idx) {
        const fallback = `Ôn tập bài khóa ${String(idx + 1).padStart(2, "0")}`;
        if (!group || Array.isArray(group)) return fallback;
        return group.title || group.name || group.heading || fallback;
      }

      function renderReadingText(text) {
        return String(text || "")
          .split(/\n+/)
          .map((line) => line.trim())
          .filter(Boolean)
          .map((line) => `<p>${escapeHtml(line)}</p>`)
          .join("");
      }

      function getReadingWordsForText(data, text) {
        const sourceWords = getSpeakingWordItems(data);
        const seen = new Set();
        const matchedWords = (sourceWords || []).filter((word) => {
          const chinese = getWordText(word);
          if (!chinese || seen.has(chinese)) return false;
          seen.add(chinese);
          return String(text || "").includes(chinese);
        });
        return (matchedWords.length ? matchedWords : sourceWords || []).slice(0, 12);
      }

      function renderInteractiveReadingText(text, words) {
        const tokens = (words || [])
          .map((word, index) => ({ word, index, text: getWordText(word) }))
          .filter((item) => item.text && item.text.length >= 2)
          .sort((a, b) => b.text.length - a.text.length);

        const line = String(text || "")
          .split(/\n+/)
          .map((line) => line.trim())
          .filter(Boolean)
          .join("");

        let html = "";
        let position = 0;
        while (position < line.length) {
          const matched = tokens.find((token) => line.startsWith(token.text, position));
          if (matched) {
            html += `<button class="reading-word-chip" type="button" data-word-index="${matched.index}">${escapeHtml(matched.text)}</button>`;
            position += matched.text.length;
          } else {
            html += escapeHtml(line[position]);
            position += 1;
          }
        }
        return `<p>${html}</p>`;
      }

      function getReadingPassageText(group, field) {
        if (Array.isArray(group.lines)) {
          return group.lines.map((line) => line[field]).filter(Boolean).join("\n");
        }
        return group[field] || "";
      }

          item.hanviet ||
          item.sinoVietnamese ||
          item.sinoVietnameseReading ||
          item.han_viet ||
          "Đang bổ sung"
        );

      function buildGeneratedWordExamples(item) {
        const word = getWordText(item);
        const meaning = item.vietnamese || item.meaning || "từ này";
        const pos = String(item.partOfSpeech || "").toLowerCase();
        if (!word) return [];

        if (pos.includes("v")) {
          return [
            {
              chinese: `我想${word}。`,
              pinyin: "",
              vietnamese: `Tôi muốn ${meaning}.`,
            },
            {
              chinese: `老师让我们${word}。`,
              pinyin: "",
              vietnamese: `Giáo viên bảo chúng tôi ${meaning}.`,
            },
          ];
        }

        if (pos.includes("adj")) {
          return [
            {
              chinese: `这里很${word}。`,
              pinyin: "",
              vietnamese: `Ở đây rất ${meaning}.`,
            },
            {
              chinese: `我觉得这个很${word}。`,
              pinyin: "",
              vietnamese: `Tôi thấy cái này rất ${meaning}.`,
            },
          ];
        }

        if (pos.includes("adv")) {
          return [
            {
              chinese: `他${word}来了。`,
              pinyin: "",
              vietnamese: `Anh ấy ${meaning} đến rồi.`,
            },
            {
              chinese: `我${word}知道了。`,
              pinyin: "",
              vietnamese: `Tôi ${meaning} biết rồi.`,
            },
          ];
        }

        return [
          {
            chinese: `这是${word}。`,
            pinyin: "",
            vietnamese: `Đây là ${meaning}.`,
          },
          {
            chinese: `我学习“${word}”这个词。`,
            pinyin: "",
            vietnamese: `Tôi học từ “${meaning}”.`,
          },
        ];
      }

      function getStructureSortOrder(item, fallbackIndex) {
        const importance = getStructureImportance(item);
        return importance ? importance.order : 1000 + fallbackIndex;
      }

      function compareStructuresByImportance(a, b) {
        const importanceA = getStructureImportance(a.item);
        const importanceB = getStructureImportance(b.item);
        const levelA = importanceA ? importanceA.level : 0;
        const levelB = importanceB ? importanceB.level : 0;

        if (levelA !== levelB) return levelB - levelA;

        const orderA = importanceA ? importanceA.order : 1000 + a.index;
        const orderB = importanceB ? importanceB.order : 1000 + b.index;
        if (orderA !== orderB) return orderA - orderB;

        return a.index - b.index;
      }

      function renderStructureStars(importance) {
        if (!importance) return "";
        return "⭐".repeat(Math.max(1, Math.min(5, Number(importance.level) || 1)));
      }

      function renderSpeakingStructureList(keepSearchFocus = false) {
        if (subject === "writing" && content === "words") {
          setReviewHeader(
            `Bài ${String(Number(lesson))} - Cấu trúc`,
            "Chọn một cấu trúc để xem giải thích và ví dụ",
          );
        }
        const grid = document.getElementById("reviewGrid");
        grid.className = "structure-list-panel";
        grid.innerHTML = "";

        if (!speakingStructureItems.length) {
          grid.innerHTML = '<p class="review-subtitle">Chưa có dữ liệu cấu trúc.</p>';
          return;
        }

        const sortedItems = speakingStructureItems
          .map((item, index) => ({ item, index }))
          .sort(compareStructuresByImportance);

        const query = structureSearchQuery.trim().toLowerCase();
        const filteredItems = sortedItems.filter(({ item }) => !query || getStructureSearchText(item).includes(query));
        const totalPages = Math.max(1, Math.ceil(filteredItems.length / structurePageSize));
        structureCurrentPage = Math.min(Math.max(1, structureCurrentPage), totalPages);
        const start = (structureCurrentPage - 1) * structurePageSize;
        const pageItems = filteredItems.slice(start, start + structurePageSize);

        grid.innerHTML = `
          <div class="structure-list-toolbar">
            <label class="structure-search">
              <span>⌕</span>
              <input id="structureSearchInput" type="search" placeholder="Tìm cấu trúc..." value="${escapeHtml(structureSearchQuery)}" />

            <div class="structure-page-controls">
              <button id="structurePrevPage" type="button" ${structureCurrentPage === 1 ? "disabled" : ""}>← Trang trước</button>

              <button id="structureNextPage" type="button" ${structureCurrentPage === totalPages ? "disabled" : ""}>Trang sau →</button>
            </div>
          </div>
          <div class="structure-list-grid" id="structureListGrid"></div>
        `;

        const listGrid = document.getElementById("structureListGrid");
        if (!pageItems.length) {
          listGrid.innerHTML = '<p class="review-subtitle structure-empty">Không tìm thấy cấu trúc phù hợp.</p>';

      async function loadListeningTests() {
        const lessonKey = String(Number(lesson));
        const res = await fetch(`data/listening-lesson-1-4.json?v=${Date.now()}`);
        if (!res.ok) throw new Error("Không tải được dữ liệu bài nghe");
        const data = await res.json();
        const existingSections = Object.keys(data).filter((key) => key.startsWith(`${lessonKey}-`));
        const sections = listeningSectionOrder
          .map((suffix) => `${lessonKey}-${suffix}`)
          .filter((key) => existingSections.includes(key));

        tests = sections.map((label, idx) => {
          const total = Array.isArray(data[label]?.questions)
            ? data[label].questions.length
            : 0;
          const title = data[label]?.title ? `${label} ${data[label].title}` : label;
          return {
            number: idx + 1,
            total,
            label: title,
            section: label,

      async function loadSpeakingExampleTests() {
        const data = await loadSpeakingLessonData();
        const size = subject === "hanyu1" ? 10 : 20;
        const items = data.__rawText ? parseTabSeparatedVocabulary(data.__rawText || "") : (data.example || []);
        const groups = splitIntoFixedGroups(items, size);

        tests = Array.from({ length: groups.length }, (_, idx) => {
          const start = idx * size + 1;
          const end = start + groups[idx].length - 1;
          return {
            number: idx + 1,
            total: groups[idx].length,
            label: `Bài kiểm tra ${String(idx + 1).padStart(2, "0")} (${start}-${end})`,

      async function loadHanyu3ExerciseTests() {
        const data = await loadSpeakingLessonData();
        const items = data.exercise || [];
        const groups = Array.isArray(items[0])
          ? items
          : items[0] && (items[0].title || Array.isArray(items[0].questions))
            ? items
          : splitIntoFixedGroups(items, 20);

        tests = groups.length
          ? groups.map((group, idx) => {
              const isExerciseObject = group && !Array.isArray(group) && (group.title || group.questions);
              const total = isExerciseObject
                ? (Array.isArray(group.questions) ? group.questions.length : 0)
                : group.length;
              return {
                number: idx + 1,
                total,
                label: isExerciseObject ? (group.title || `Bài tập ${String(idx + 1).padStart(2, "0")}`) : `Bài tập ${String(idx + 1).padStart(2, "0")}`,
                hasData: total > 0,
              };

              number: idx + 1,
              total: 0,
              label: `Bài tập ${String(idx + 1).padStart(2, "0")}`,

            stored &&

              window.location.href = `typing.html?lesson=${lesson}&test=${test.number}&subject=${subject}&content=example`;
              return;

            if (subject !== "writing" && content === "listening" && test.section) {
              window.location.href = `listening-test.html?lesson=${lesson}&section=${test.section}${subjectParam}`;

            window.location.href = `typing.html?lesson=${lesson}&test=${test.number}${subjectParam}${contentParam}`;

            : subject === "writing" && content === "structure"
              ? `Bài ${String(Number(lesson))} - Kiểm tra cấu trúc`
            : subject === "speaking" && content === "words"
              ? `Bài ${String(Number(lesson))} - Từ mới`
            : content === "grammar"
              ? `Bài ${String(Number(lesson))} - Cấu trúc`
            : subject === "speaking" && content === "structure"
              ? `Bài ${String(Number(lesson))} - Kiểm tra cấu trúc`
            : subject === "speaking" && content === "example"
              ? `Bài ${String(Number(lesson))} - Kiểm tra phản xạ`
            : subject === "speaking" && content === "paragraph"
              ? `Bài ${String(Number(lesson))} - Ôn tập bài khóa`
            : (subject === "hanyu1" || subject === "hanyu3") && content === "words"
              ? `Bài ${String(Number(lesson))} - Từ mới`
            : (subject === "hanyu1" || subject === "hanyu3") && content === "structure"
              ? `Bài ${String(Number(lesson))} - Kiểm tra cấu trúc`
            : (subject === "hanyu1" || subject === "hanyu3") && content === "example"
              ? `Bài ${String(Number(lesson))} - Kiểm tra phản xạ`

              ? `Bài ${String(Number(lesson))} - Bài tập`
            : (subject === "hanyu1" || subject === "hanyu3") && content === "paragraph"
              ? `Bài ${String(Number(lesson))} - Ôn tập bài khóa`
            : subject !== "writing" && content === "listening"
              ? `Bài ${String(Number(lesson))} - Bài tập nghe`
            : subject === "listening" && content === "example"
              ? `Bài ${String(Number(lesson))} - Kiểm tra phản xạ`
            : subject === "writing"
              ? `Bài ${String(Number(lesson))} - Tham khảo bài văn`
            : `Bài ${lesson} - Ôn tập`;
        setReviewHeader(reviewTitleText, "Chọn bài để bắt đầu");

        let completedTests = 0;
        let activeTests = 0;
        setTimeout(() => {
          const heroSubtitle = document.querySelector(".speaking-hero-subtitle");

            heroSubtitle.textContent = `${totalTests} bài kiểm tra - mỗi bài ${questionsPerTest} câu`;
          }

        document.body.classList.add("reflex-review-page");

        tests.forEach((test) => {
          const progressKey = `typingProgress-${storagePrefix}${lesson}-${test.number}`;

          try {
            stored = JSON.parse(localStorage.getItem(progressKey) || "null");
          } catch (e) {
            stored = null;
          }
          const totalForDisplay = Math.max(1, test.total || 0);
          if (stored && typeof stored.currentIndex === "number" && stored.currentIndex >= totalForDisplay) {
            completedTests += 1;
          } else if (stored && typeof stored.currentIndex === "number" && stored.currentIndex > 0) {
            activeTests += 1;

            document.getElementById("reviewGrid").innerHTML =
              `<p class="review-subtitle">${err.message}</p>`;
          });
      } else if (subject === "writing") {
        loadExampleTests()
          .then(() => renderWritingReferenceReader(1))
          .catch((err) => {
            document.getElementById("reviewGrid").innerHTML =
              `<p class="review-subtitle">${err.message}</p>`;
          });
      } else {
        renderReview();
      }
    </script>
  </body>
</html>
