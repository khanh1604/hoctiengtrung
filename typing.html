      function getPracticeActivityCopy(content, test, subject) {
        const testLabel = String(Number(test)).padStart(2, "0");
        const copies = {
          paragraph: {
            title: `Ôn tập bài khóa ${testLabel}`,
            subtitle: "Luyện dịch câu - Việt sang Trung",
            hint: "Gợi ý: Nhớ lại nội dung bài khóa và dịch tự nhiên.",
          },
          structure: {
            title: `Luyện tập cấu trúc ${testLabel}`,
            subtitle: "20 câu cấu trúc - Việt sang Trung",
            hint: "Gợi ý: Dùng đúng mẫu câu và trật tự từ đã học.",
          },
          example: {
            title: `Bài kiểm tra ${testLabel}`,
            subtitle: (subject === "hanyu1" || subject === "hanyu2") ? "10 câu phản xạ - Việt sang Trung" : "20 câu phản xạ - Việt sang Trung",
            hint: "Gợi ý: Sử dụng cách nói lịch sự và tự nhiên.",
          },
        };
        return copies[content] || copies.example;
      }

            <nav class="speaking-nav" aria-label="Điều hướng bài tập">

                  </div>
                </header>

                </section>

                  <button type="button" class="fill-explain-btn" id="fillExplainBtn" disabled>🔒 Xem giải thích</button>

      function escapeFillHtml(text) {
        return String(text ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function renderFillCompletedSentence(item) {
        const completed = String(item.completed || "");
        const answers = String(item.answer || "")
          .split("/")
          .map((part) => part.trim())
          .filter(Boolean);
        if (!completed || !answers.length) return escapeFillHtml(completed);

        let cursor = 0;
        let html = "";
        let matched = false;
        answers.forEach((answer) => {
          const answerIndex = completed.indexOf(answer, cursor);
          if (answerIndex < 0) return;
          html += escapeFillHtml(completed.slice(cursor, answerIndex));
          html += `<u class="fill-answer-underline">${escapeFillHtml(answer)}</u>`;
          cursor = answerIndex + answer.length;
          matched = true;
        });

        if (!matched) return escapeFillHtml(completed);
        html += escapeFillHtml(completed.slice(cursor));
        return html;
      }

      function renderFillAnswerChips(answer) {
        return String(answer || "")
          .split("/")
          .map((part) => part.trim())
          .filter(Boolean)
          .map((part) => `<span class="fill-answer-chip">${escapeFillHtml(part)}</span>`)
          .join("");
      }

      function renderFillExplanationText(explanation) {
        const lines = String(explanation || "")
          .split(/\r?\n/)
          .map((line) => line.trim())
          .filter(Boolean);
        if (!lines.length) return "";
        return `<div class="fill-explanation-notes">${lines
          .map((line) => `<p>${escapeFillHtml(line)}</p>`)
          .join("")}</div>`;
      }

      async function initFillBlankExercise({ lesson, test }) {
        const res = await fetch(`data/hanyu3-lessons.json?v=${Date.now()}`);
        if (!res.ok) throw new Error("Không tải được dữ liệu bài tập");
        const data = await res.json();
        const exercise = data[String(Number(lesson))]?.exercise?.[Number(test) - 1] || {};
        const questions = exercise.questions || [];
        const allowReuse = Boolean(exercise.allowReuse) || [3, 4].includes(Number(test));
        const answers = allowReuse
          ? Array.from(new Set(questions.flatMap((item) => String(item.answer || "").split("/").map((part) => part.trim()).filter(Boolean))))
          : questions.map((item) => item.answer).filter(Boolean);
        const wordBank = document.getElementById("fillWordBank");
        const list = document.getElementById("fillQuestionList");
        const doneCount = document.getElementById("fillDoneCount");
        const progressText = document.getElementById("fillProgressText");
        const statusText = document.getElementById("fillStatusText");
        const explainBtn = document.getElementById("fillExplainBtn");
        const explanationCard = document.getElementById("fillExplanationCard");

        wordBank.innerHTML = answers
          .map((word) => `<button type="button" class="fill-word-chip">${escapeFillHtml(word)}</button>`)
          .join("");

        list.innerHTML = questions
          .map((item, idx) => {
            let blankIndex = 0;
            const sentence = escapeFillHtml(item.question).replace(/____/g, () => {
              const html = `<input class="fill-answer-input" data-index="${idx}" data-blank="${blankIndex}" aria-label="Câu ${idx + 1} ô ${blankIndex + 1}" />`;
              blankIndex += 1;
              return html;
            });
            return `<li class="fill-question-row" data-index="${idx}"><span>${idx + 1}</span><p>${sentence}</p></li>`;
          })
          .join("");

        const inputs = Array.from(document.querySelectorAll(".fill-answer-input"));
        const totalBlanks = inputs.length || questions.length;
        let selectedInput = inputs[0] || null;

        function refreshWordBankState() {
          if (allowReuse) return;
          const used = new Set(inputs.map((input) => input.value.trim()).filter(Boolean));
          document.querySelectorAll(".fill-word-chip").forEach((button) => {
            const word = button.textContent.trim();
            button.disabled = used.has(word);
            button.classList.toggle("is-used", used.has(word));
          });
        }

        function updateProgress() {
          const filled = inputs.filter((input) => input.value.trim()).length;
          doneCount.textContent = `${filled}/${totalBlanks}`;
          progressText.textContent = `${filled}/${totalBlanks} ô`;
          refreshWordBankState();
        }

        inputs.forEach((input) => {
          input.addEventListener("focus", () => {
            selectedInput = input;
          });
          input.addEventListener("input", updateProgress);
        });

        document.querySelectorAll(".fill-word-chip").forEach((button) => {
          button.addEventListener("click", () => {
            if (button.disabled) return;
            const target = selectedInput || inputs.find((input) => !input.value.trim()) || inputs[0];
            if (!target) return;
            target.value = button.textContent.trim();
            target.focus();
            selectedInput = target;
            updateProgress();
          });
        });

        document.getElementById("fillResetBtn").addEventListener("click", () => {
          inputs.forEach((input) => {
            input.value = "";
            input.classList.remove("is-correct", "is-wrong");
          });
          document.querySelectorAll(".fill-question-row").forEach((row) => row.classList.remove("is-correct", "is-wrong"));
          explanationCard.classList.add("is-locked");
          explanationCard.innerHTML = `
            <div class="fill-lock-icon">🔒</div>
            <div>
              <h2>Giải thích sẽ mở sau khi bạn hoàn thành tất cả câu.</h2>
              <p>Vui lòng điền hết 8/8 câu và nhấn “Kiểm tra đáp án” để xem đáp án, giải thích và nghĩa câu.</p>
            </div>
          `;
          explainBtn.disabled = true;
          statusText.textContent = "Chưa kiểm tra";
          updateProgress();
        });

        document.getElementById("fillCheckBtn").addEventListener("click", () => {
          let correct = 0;
          inputs.forEach((input, idx) => {
            const questionIndex = Number(input.dataset.index || idx);
            const blankIndex = Number(input.dataset.blank || 0);
            const expectedAnswers = String(questions[questionIndex].answer || "")
              .split("/")
              .map((part) => part.trim())
              .filter(Boolean);
            const expected = expectedAnswers[blankIndex] || expectedAnswers[0] || "";
            const ok = input.value.trim() === expected;
            correct += ok ? 1 : 0;
            input.classList.toggle("is-correct", ok);
            input.classList.toggle("is-wrong", !ok);
            input.closest(".fill-question-row")?.classList.toggle("is-correct", ok);
            input.closest(".fill-question-row")?.classList.toggle("is-wrong", !ok);
          });
          statusText.textContent = `${correct}/${totalBlanks} đúng`;
          explainBtn.disabled = false;
          explanationCard.classList.remove("is-locked");
          explanationCard.innerHTML = `
            <h2>Đáp án và giải thích</h2>
            <div class="fill-explanation-list">
              ${questions.map((item, idx) => `
                <article>
                  <strong>${idx + 1}. ${renderFillCompletedSentence(item)}</strong>
                  <small>${escapeFillHtml(item.pinyin)}</small>
                  <p>${escapeFillHtml(item.meaning)}</p>
                  <div class="fill-answer-row"><b>Đáp án:</b>${renderFillAnswerChips(item.answer)}</div>
                  ${renderFillExplanationText(item.explanation)}
                </article>
              `).join("")}
            </div>
          `;
        });

        explainBtn.addEventListener("click", () => {
          explanationCard.scrollIntoView({ behavior: "smooth", block: "center" });
        });

        updateProgress();
      }

      function ErrorCorrectionExerciseForm({ subject, lesson, test }) {
        const lessonLabel = String(Number(lesson)).padStart(2, "0");
        const testNumber = Number(test);
        const isPracticalAnswer = testNumber === 6;
        const title = isPracticalAnswer ? `Bài ${lessonLabel} - Trả lời câu hỏi` : `Bài ${lessonLabel} - Sửa lỗi sai`;
        const subtitle = isPracticalAnswer

            <section class="error-exercise-layout">

                  <dl class="error-summary-stats">
                    <div><dt>Câu hiện tại</dt><dd id="errorCurrentText">01/${totalLabel}</dd></div>
                    <div><dt>Đã làm</dt><dd id="errorDoneText">0</dd></div>
                    <div><dt>Đúng</dt><dd id="errorRightText">0</dd></div>
                    <div><dt>Tỷ lệ đúng</dt><dd id="errorAccuracyText">0%</dd></div>
                  </dl>

              <aside class="error-exercise-aside">

      function normalizeCorrectionAnswer(value) {
        return String(value || "")
          .replace(/[，。！？、,.!?;；：:\s]/g, "")
          .toLowerCase();
      }

      async function initErrorCorrectionExercise({ lesson, test }) {
        const res = await fetch(`data/hanyu3-lessons.json?v=${Date.now()}`);
        if (!res.ok) throw new Error("Không tải được dữ liệu bài tập");
        const data = await res.json();
        const testNumber = Number(test);
        const isPracticalAnswer = testNumber === 6;
        const lessonLabel = String(Number(lesson)).padStart(2, "0");
        const exercise = data[String(Number(lesson))]?.exercise?.[testNumber - 1] || {};
        const questions = exercise.questions || [];
        if (!questions.length) throw new Error("Bài tập này chưa có câu hỏi");
        const activityType = questions[0]?.type || exercise.type || (isPracticalAnswer ? "practicalAnswer" : "errorCorrection");
        const isRewriteSentence = activityType === "rewriteSentence";
        const isCompleteSentence = activityType === "completeSentence";
        const isMakeSentence = activityType === "makeSentence";
        const isPositionIdentify = activityType === "positionIdentify";

        const modeTitle = isMakeSentence
          ? "Tạo câu"
          : isPositionIdentify
            ? "Xác định vị trí"
            : isCompleteSentence
              ? "Hoàn thành câu"
              : isRewriteSentence
                ? "Viết lại câu"
                : (isPracticalAnswer ? "Trả lời câu hỏi" : "Sửa lỗi sai");
        const modeSubtitle = isMakeSentence
          ? "Dựa vào tình huống để tạo câu bằng cấu trúc được yêu cầu"
          : isPositionIdentify
            ? "Dựa vào hướng chuyển động để xác định vị trí người nói"
            : isCompleteSentence
              ? "Điền phần còn thiếu để hoàn thành câu, rồi xem đáp án và giải thích"
              : isRewriteSentence
                ? "Viết lại câu bằng cấu trúc được yêu cầu, rồi xem đáp án và giải thích"
                : (isPracticalAnswer
                  ? "Trả lời bằng kiến thức thực tế, rồi xem câu mẫu và giải thích"
                  : "Tự sửa câu sai rồi mới xem đáp án và giải thích");
        const questionLabelText = isMakeSentence
          ? "Tình huống"
          : isPositionIdentify
            ? "Đối thoại"
            : isCompleteSentence || isRewriteSentence
              ? "Câu gốc"
              : (isPracticalAnswer ? "Câu hỏi" : "Câu sai");
        const answerLabelText = isMakeSentence
          ? "Nhập câu tạo thành"
          : isPositionIdentify
            ? "Nhập vị trí"
            : isCompleteSentence
              ? "Nhập câu hoàn chỉnh"
              : isRewriteSentence
                ? "Nhập câu viết lại"
                : (isPracticalAnswer ? "Nhập câu trả lời" : "Nhập câu đúng");
        const answerPlaceholderText = isRewriteSentence
          ? "Nhập câu viết lại bằng chữ Hán..."
          : isCompleteSentence
            ? "Nhập câu hoàn chỉnh bằng chữ Hán..."
            : isMakeSentence
              ? "Nhập câu tạo thành bằng chữ Hán..."
              : isPositionIdentify
                ? "Ví dụ: A ở 上边；B ở 上边；她在下边。"
                : (isPracticalAnswer ? "Nhập câu trả lời bằng chữ Hán..." : "Nhập câu sửa lại bằng chữ Hán...");
        const hintText = isMakeSentence
          ? "Gợi ý: Dùng 快……了 / 要……了 / 快要……了 / 就要……了 cho phù hợp."
          : isPositionIdentify
            ? "Gợi ý: 来 thường hướng về phía người nói, 去 thường rời xa người nói."
            : isCompleteSentence
              ? "Gợi ý: Dựa vào ngữ cảnh và cấu trúc đã học để hoàn thành câu."
              : isRewriteSentence
                ? "Gợi ý: Dùng cấu trúc 跟……一样 để viết lại câu."
                : (isPracticalAnswer
                  ? "Gợi ý: Dùng cấu trúc so sánh phù hợp với nội dung câu hỏi."
                  : "Gợi ý: Tìm lỗi trong cấu trúc so sánh, bổ ngữ hoặc trật tự từ.");

        document.getElementById("errorModeLabel").textContent = modeTitle;
        document.getElementById("errorExerciseTitle").textContent = `Bài ${lessonLabel} - ${modeTitle}`;
        document.getElementById("errorExerciseSubtitle").textContent = modeSubtitle;
        document.getElementById("errorQuestionLabel").textContent = questionLabelText;
        document.getElementById("errorAnswerLabel").textContent = answerLabelText;
        document.getElementById("errorAnswerInput").placeholder = answerPlaceholderText;
        document.getElementById("errorProgressTitle").textContent = `◴ Tiến độ bài ${modeTitle.toLowerCase()}`;

        let current = 0;
        const answers = Array(questions.length).fill("");
        const checked = Array(questions.length).fill(false);
        const correct = Array(questions.length).fill(false);
        const flagged = new Set();

        const els = {
          currentText: document.getElementById("errorCurrentText"),
          doneText: document.getElementById("errorDoneText"),
          rightText: document.getElementById("errorRightText"),
          accuracyText: document.getElementById("errorAccuracyText"),
          progressBar: document.getElementById("errorProgressBar"),
          progressText: document.getElementById("errorProgressText"),
          wrong: document.getElementById("errorWrongSentence"),
          input: document.getElementById("errorAnswerInput"),
          hintLine: document.getElementById("errorHintLine"),
          result: document.getElementById("errorResultCard"),
          grid: document.getElementById("errorQuestionGrid"),
          donut: document.getElementById("errorDonut"),
          sideRight: document.getElementById("errorSideRight"),
          sideWrong: document.getElementById("errorSideWrong"),
          sideLeft: document.getElementById("errorSideLeft"),
          sideAccuracy: document.getElementById("errorSideAccuracy"),
        };

        function showResult(item, ok) {
          els.result.classList.remove("is-locked", "is-correct", "is-wrong");
          els.result.classList.add(ok ? "is-correct" : "is-wrong");
          els.result.innerHTML = `
            <strong>${ok ? "Kết quả: Đúng" : "Kết quả: Chưa đúng"}</strong>
            <dl>
              <div><dt>${isPracticalAnswer ? "Câu mẫu" : (isPositionIdentify ? "Vị trí đúng" : (isMakeSentence ? "Câu tạo thành" : (isCompleteSentence ? "Câu hoàn chỉnh" : (isRewriteSentence ? "Câu viết lại" : "Câu đúng"))))}</dt><dd>${escapeFillHtml(item.answer)}</dd></div>
              <div><dt>Pinyin</dt><dd>${escapeFillHtml(item.pinyin)}</dd></div>
              <div><dt>Nghĩa</dt><dd>${escapeFillHtml(item.meaning)}</dd></div>
              <div><dt>Giải thích</dt><dd>${escapeFillHtml(item.explanation)}</dd></div>
            </dl>
          `;
        }

        function renderGrid() {
          els.grid.innerHTML = questions
            .map((_, idx) => {
              const classes = [
                idx === current ? "is-current" : "",
                checked[idx] ? (correct[idx] ? "is-correct" : "is-wrong") : "",
                flagged.has(idx) ? "is-flagged" : "",
              ].filter(Boolean).join(" ");
              return `<button type="button" class="${classes}" data-index="${idx}">
                ${String(idx + 1).padStart(2, "0")} ${flagged.has(idx) ? "<small>⚑</small>" : ""}
                <em>${checked[idx] ? (correct[idx] ? "Đúng" : "Sai") : "Chưa làm"}</em>
              </button>`;
            })
            .join("");
          els.grid.querySelectorAll("button").forEach((button) => {
            button.addEventListener("click", () => {
              saveCurrentAnswer();
              current = Number(button.dataset.index || 0);
              renderQuestion();
            });
          });
        }

        function updateStats() {
          const done = checked.filter(Boolean).length;
          const right = correct.filter(Boolean).length;
          const wrong = done - right;
          const percent = questions.length ? Math.round((done / questions.length) * 100) : 0;
          const accuracy = done ? Math.round((right / done) * 100) : 0;
          els.currentText.textContent = `${String(current + 1).padStart(2, "0")}/${String(questions.length).padStart(2, "0")}`;
          els.doneText.textContent = String(done);
          els.rightText.textContent = String(right);
          els.accuracyText.textContent = `${accuracy}%`;
          els.progressBar.style.width = `${percent}%`;
          els.progressText.textContent = `${percent}% hoàn thành`;
          if (els.donut) {
            const rightPct = questions.length ? (right / questions.length) * 100 : 0;
            const wrongEndPct = questions.length
              ? ((right + wrong) / questions.length) * 100
              : 0;
            els.donut.style.setProperty("--right", `${rightPct}%`);
            els.donut.style.setProperty("--wrong-end", `${wrongEndPct}%`);
          }
          els.donut.innerHTML = `<span>${done}/${questions.length}</span><small>Đã làm</small>`;
          els.sideRight.textContent = String(right);
          els.sideWrong.textContent = String(wrong);
          els.sideLeft.textContent = String(questions.length - done);
          els.sideAccuracy.textContent = `${accuracy}%`;
        }

        function saveCurrentAnswer() {
          answers[current] = els.input.value.trim();
        }

        function renderQuestion() {
          const item = questions[current];
          els.wrong.textContent = item.question || item.wrong || "";
          els.input.value = answers[current] || "";
          els.hintLine.textContent = hintText;
          if (checked[current]) {
            showResult(item, correct[current]);
          } else {
            els.result.className = "error-result-card is-locked";
            els.result.innerHTML = "<strong>🔒 Giải thích sẽ mở sau khi bạn trả lời.</strong>";
          }
          document.getElementById("errorFlagBtn").classList.toggle("is-active", flagged.has(current));
          renderGrid();
          updateStats();
        }

        document.getElementById("errorHintBtn").addEventListener("click", () => {
          els.hintLine.textContent = isRewriteSentence
            ? "Gợi ý: Hãy gộp hai câu thành một câu dùng 跟……一样."
            : isCompleteSentence
              ? "Gợi ý: Hãy hoàn thành cả câu, không chỉ nhập riêng từ còn thiếu."
              : isMakeSentence
                ? "Gợi ý: Chọn một trong các mẫu 快……了 / 要……了 / 快要……了 / 就要……了."
                : isPositionIdentify
                  ? "Gợi ý: Xem động từ hướng là 上来、下来、进去、出来、出去、回来 hay 过来."
                  : (isPracticalAnswer
                    ? "Gợi ý: Hãy trả lời bằng mẫu 没有 / 比 / V + 得 + Adj nếu cần so sánh."
                    : "Gợi ý: Hãy so lại với mẫu 比 / 没有 / V + 得 + Adj trong bài 1.");
        });

        document.getElementById("errorCheckBtn").addEventListener("click", () => {
          saveCurrentAnswer();
          const item = questions[current];
          const ok = normalizeCorrectionAnswer(answers[current]) === normalizeCorrectionAnswer(item.answer);
          checked[current] = true;
          correct[current] = ok;
          showResult(item, ok);
          renderGrid();
          updateStats();
        });

        document.getElementById("errorPrevBtn").addEventListener("click", () => {
          saveCurrentAnswer();
          current = Math.max(0, current - 1);
          renderQuestion();
        });

        document.getElementById("errorNextBtn").addEventListener("click", () => {
          saveCurrentAnswer();
          current = Math.min(questions.length - 1, current + 1);
          renderQuestion();
        });

        document.getElementById("errorFlagBtn").addEventListener("click", () => {
          if (flagged.has(current)) flagged.delete(current);
          else flagged.add(current);
          renderGrid();
          document.getElementById("errorFlagBtn").classList.toggle("is-active", flagged.has(current));
        });

        renderQuestion();
      }

      (async function renderReflexTypingLayout() {
        const params = new URLSearchParams(window.location.search);

                  ? "Nghe hiểu"
                  : "Khẩu ngữ",
        });
        return;
        document.querySelector(".card").outerHTML = `

            <a class="speaking-logo" href="index.html">FTC</a>
            <nav class="speaking-nav" aria-label="Điều hướng kiểm tra">
              <a href="index.html">⌂ Trang chủ</a>

              <span>›</span>
              <a href="lesson-options.html?lesson=${lesson}&subject=${subject}">Bài ${String(Number(lesson)).padStart(2, "0")}</a>
              <span>›</span>
              <a href="typing.html?lesson=${lesson}&test=${test}&subject=${subject}&content=${content}">Bài kiểm tra ${String(Number(test)).padStart(2, "0")}</a>
            </div>

            <section class="reflex-typing-layout">
              <div class="reflex-typing-primary">
                <header class="reflex-typing-hero">
                  <div class="reflex-typing-art" aria-hidden="true">⚡</div>
                  <div class="reflex-typing-copy">
                    <div class="lesson reflex-typing-title">Bài kiểm tra ${String(Number(test)).padStart(2, "0")}</div>
                    <p>20 câu phản xạ - Viết sang Trung</p>
                    <div class="reflex-typing-stats">
                      <span>Câu hiện tại <b class="reflex-current">01/20</b></span>
                      <span>Đã làm <b class="reflex-done">0</b></span>

                    </div>
                    <h1 class="question">Đang tải câu hỏi...</h1>

                    <label for="answerInput">Nhập tiếng Trung</label>
                    <input id="answerInput" type="text" placeholder="Nhập đáp án bằng chữ Hán..." class="answer-input" />

                    <div class="reflex-action-row">
                      <span class="reflex-hint">Gợi ý: Sử dụng cách nói lịch sự và tự nhiên.</span>
                      <button class="sound-btn" type="button">🔊 Nghe câu tiếng Trung</button>
                      <button class="check-btn" type="button">Kiểm tra</button>
                    </div>

                    <div class="answer-feedback" hidden></div>
                  </section>

                </div>

                <div class="reflex-bottom-nav">
                  <button type="button" class="reflex-prev-btn">← Câu trước</button>
                  <button type="button" class="reflex-next-btn">Câu tiếp theo →</button>
                </div>
              </div>

              <aside class="reflex-typing-aside">
                <article class="reflex-side-card">
                  <h2>Câu đã đặt cờ</h2>
                  <div class="reflex-question-grid" id="reflexQuestionGrid"></div>
                </article>

                <section class="reflex-settings-card">
                  <h2>Cài đặt luyện tập</h2>
                  <button class="tool-btn" type="button">Giọng đọc và tốc độ</button>
                  <div class="custom-panel active" id="customPanel">
                    <div class="custom-row">
                      <label for="voiceSelect">Giọng đọc</label>
                      <select id="voiceSelect"></select>
                    </div>
                    <div class="custom-row">
                      <label for="speedRange">Tốc độ: <span id="speedValue">1.0</span>x</label>
                      <input id="speedRange" type="range" min="0.5" max="2" step="0.1" value="1" />
                    </div>
                    <button class="custom-close-btn" id="customCloseBtn" type="button">Ẩn cài đặt</button>
                  </div>
                  <button class="reset-btn" type="button" onclick="resetToStart()">Làm lại từ đầu</button>
                </section>

                <article class="reflex-side-card">
                  <h2>Tiến độ kiểm tra</h2>
                  <div class="reflex-donut">
                    <strong class="reflex-donut-count">0/20</strong>
                    <span>Đã làm</span>
                  </div>
                  <ul>
                    <li><span class="ok"></span>Đúng <b class="reflex-right-count">0</b></li>
                    <li><span class="bad"></span>Sai <b class="reflex-wrong-count">0</b></li>
                    <li><span class="left"></span>Còn lại <b class="reflex-left-count">20</b></li>
                  </ul>
                  <p>Tỷ lệ đúng: <b class="reflex-side-accuracy">0%</b></p>
                </article>
              </aside>
            </section>
          </main>
        `;
      })();

      function goBackToReview() {
        const params = new URLSearchParams(window.location.search);
        const lesson = params.get("lesson") || "01";
        const subject = params.get("subject");
        const content = params.get("content");
        const subjectParam = subject ? `&subject=${subject}` : "";
        const contentParam = content ? `&content=${content}` : "";
        window.location.href = `review.html?lesson=${lesson}${subjectParam}${contentParam}`;
      }

      function resetToStart() {
        const params = new URLSearchParams(window.location.search);
        const lesson = params.get("lesson") || "01";
        const test = params.get("test") || "1";
        const subject = params.get("subject") || "";
        const content = params.get("content") || "";
        const storagePrefix = `${subject ? `${subject}-` : ""}${content ? `${content}-` : ""}`;
        const progressKey = `typingProgress-${storagePrefix}${lesson}-${test}`;

        localStorage.removeItem(progressKey);
        sessionStorage.setItem("currentQuestion", "0");
        sessionStorage.setItem("currentTest", test);
        sessionStorage.setItem(`typingExp-${storagePrefix}${lesson}-${test}`, "0");
        sessionStorage.setItem(`typingReset-${storagePrefix}${lesson}-${test}`, "1");
        window.location.reload();
      }
    </script>
    <script src="app.js?v=20260623-android-touch-fix"></script>
  </body>
</html>
