<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phân Xạ Tiếng Trung - Chinese Learning</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="menu-page">
    <div class="menu-container">
      <div class="header">
        <div class="user-info">
          <span class="user-name">trandinhkhanh1...</span>
          <span class="badge">FREE</span>
          <button class="upgrade-btn">Đăng xuất</button>
        </div>
        <div class="nav-buttons">
          <button class="nav-btn upgrade">📚 Nâng Cấp</button>
          <button class="nav-btn dropdown">🌙 Bóng Đêm ▼</button>
        </div>
      </div>

      <div class="menu-content">
        <h1 class="menu-title">Chuyên Ngành Ngôn Ngữ Trung FTC</h1>
        <p class="menu-subtitle">Bạn muốn học theo phương pháp nào?</p>

        <div class="options-container">
          <button
            class="option-btn typing-mode"
            onclick="window.location.href = 'choose-level.html'"
          >
            <span class="option-icon">⌨️</span>
            <span class="option-title">Typing</span>
            <span class="option-desc">Dịch từ tiếng Việt--thành chữ hán</span>
          </button>

          <button class="option-btn word-bank">
            <span class="option-icon">🧩</span>
            <span class="option-title">Word Bank</span>
            <span class="option-desc">Sắp xếp các mảnh ghép thành câu/từ</span>
          </button>
        </div>

        <div class="leaderboard">
          <div class="leaderboard-header">
            <span class="leaderboard-title">🏆 Bảng Xếp Hạng</span>
            <button class="leaderboard-icon">🔍</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
