<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chọn Mục - Chinese Learning</title>
    <link rel="stylesheet" href="style.css" />
    <script src="theme.js" defer></script>
  </head>

  <body class="lesson-options-page">
    <div class="lesson-options-container">
      <div class="lesson-options-content">
        <h1 class="options-title" id="lessonTitle">
          Bài 01 你学了多张时间汉语了
        </h1>
        <p class="options-subtitle">Chọn mục để học</p>

        <button
          class="back-btn-options"
          onclick="goBackToLessons()"
        >
          ← Quay lại danh sách bài
        </button>

        <div class="options-grid">
          <button
            class="option-card vocabulary"
            id="vocabularyCard"
            onclick="goToContent('vocabulary')"
          >
            <span class="option-card-icon" id="vocabularyIcon">📚</span>
            <span class="option-card-title" id="vocabularyTitle">Ôn tập từ vựng</span>
            <span class="option-card-desc" id="vocabularyDesc">Học các từ vựng mới</span>
          </button>

          <button
            class="option-card listening"
            id="listeningCard"
            onclick="goToContent('listening')"
          >
            <span class="option-card-icon" id="listeningIcon">🎧</span>
            <span class="option-card-title" id="listeningTitle">Ôn tập đoạn nghe</span>
            <span class="option-card-desc" id="listeningDesc">Luyện nghe và hiểu</span>
          </button>

          <button
            class="option-card grammar"
            id="structureCard"
            onclick="goToContent('grammar')"
            hidden
          >
            <span class="option-card-icon" id="structureIcon">🧩</span>
            <span class="option-card-title" id="structureTitle">Cấu trúc</span>
            <span class="option-card-desc" id="structureDesc">Học mẫu câu và ví dụ</span>
          </button>

          <button
            class="option-card grammar"
            id="grammarCard"
            onclick="goToContent('grammar')"
            hidden
          >
            <span class="option-card-icon" id="grammarIcon">📝</span>
            <span class="option-card-title" id="grammarTitle">Cấu trúc</span>
            <span class="option-card-desc" id="grammarDesc">Học cấu trúc câu và ngữ pháp</span>
          </button>

          <button class="option-card review" id="reviewCard" onclick="goToReview()">
            <span class="option-card-icon" id="reviewIcon">✅</span>
            <span class="option-card-title" id="reviewTitle">Ôn tập ví dụ</span>
            <span class="option-card-desc" id="reviewDesc">10 bài kiểm tra - 32 câu/bài</span>
          </button>

          <button
            class="option-card grammar"
            id="exerciseCard"
            onclick="goToContent('exercise')"
            hidden
          >
            <span class="option-card-icon" id="exerciseIcon">✍️</span>
            <span class="option-card-title" id="exerciseTitle">Bài tập</span>
            <span class="option-card-desc" id="exerciseDesc">6 mục bài tập</span>
          </button>
        </div>
      </div>
    </div>

    <script>
      function getURLParam(name) {
        const params = new URLSearchParams(window.location.search);
        return params.get(name);
      }

      function goToContent(content) {
        const lesson = getURLParam("lesson") || "01";
        const subject = getURLParam("subject");
        const subjectParam = subject ? `&subject=${subject}` : "";
        if (subject === "writing") {
          if (content === "vocabulary") {
            window.location.href = `review.html?lesson=${lesson}&subject=writing&content=paragraph`;
            return;
          }
          if (content === "words") {
            window.location.href = `review.html?lesson=${lesson}&subject=writing&content=grammar`;
            return;
          }
          if (content === "grammar") {
            window.location.href = `review.html?lesson=${lesson}&subject=writing&content=grammar`;
            return;
          }
          if (content === "structure") {
            window.location.href = `review.html?lesson=${lesson}&subject=writing&content=grammar`;
            return;
          }
          if (content === "example") {
            window.location.href = `review.html?lesson=${lesson}&subject=writing`;
            return;
          }
        }
        if (subject === "speaking") {
          if (content === "vocabulary") {
            window.location.href = `review.html?lesson=${lesson}&subject=speaking&content=paragraph`;
            return;
          }
          if (content === "grammar") {
            window.location.href = `review.html?lesson=${lesson}&subject=speaking&content=grammar`;
            return;
          }
          if (content === "words") {
            window.location.href = `review.html?lesson=${lesson}&subject=speaking&content=words`;
            return;
          }
          if (content === "structure") {
            window.location.href = `review.html?lesson=${lesson}&subject=speaking&content=structure`;
            return;
          }
          if (content === "example") {
            window.location.href = `review.html?lesson=${lesson}&subject=speaking&content=example`;
            return;
          }
        }
        if (subject === "hanyu3") {
          if (content === "vocabulary") {
            window.location.href = `review.html?lesson=${lesson}&subject=hanyu3&content=paragraph`;
            return;
          }
          if (content === "words") {
            window.location.href = `review.html?lesson=${lesson}&subject=hanyu3&content=words`;
            return;
          }
          if (content === "grammar") {
            window.location.href = `review.html?lesson=${lesson}&subject=hanyu3&content=grammar`;
            return;
          }
          if (content === "structure") {
            window.location.href = `review.html?lesson=${lesson}&subject=hanyu3&content=structure`;
            return;
          }
          if (content === "example") {
            window.location.href = `review.html?lesson=${lesson}&subject=hanyu3&content=example`;
            return;
          }
          if (content === "exercise") {
            window.location.href = `review.html?lesson=${lesson}&subject=hanyu3&content=exercise`;
            return;
          }
        }
        if (content === "vocabulary" && subject !== "writing") {
          window.location.href = `vocabulary.html?lesson=${lesson}${subjectParam}`;
          return;
        }
        if (content === "listening" && subject !== "writing") {
          window.location.href = `review.html?lesson=${lesson}&content=${content}${subjectParam}`;
          return;
        }
        if (content === "example" && subject === "listening") {
          window.location.href = `review.html?lesson=${lesson}&content=example${subjectParam}`;
          return;
        }
        window.location.href = `typing.html?lesson=${lesson}&content=${content}${subjectParam}`;
      }

      function goToReview() {
        const lesson = getURLParam("lesson") || "01";
        const subject = getURLParam("subject");
        if (subject === "listening") {
          const lessonNumber = String(Number(lesson));
          const contentPart = lessonNumber === "1" ? "" : "&content=example";
          window.location.href = `review.html?lesson=${lesson}&subject=listening${contentPart}`;
          return;
        }
        const subjectParam = subject ? `&subject=${subject}` : "";
        window.location.href = `review.html?lesson=${lesson}${subjectParam}`;
      }

      function goToParagraphReview() {
        const lesson = getURLParam("lesson") || "01";
        window.location.href = `review.html?lesson=${lesson}&subject=writing&content=paragraph`;
      }

      function goToGrammarReview() {
        const lesson = getURLParam("lesson") || "01";
        window.location.href = `review.html?lesson=${lesson}&subject=writing&content=grammar`;
      }

      function goBackToLessons() {
        const subject = getURLParam("subject");
        window.location.href =
          subject === "writing"
            ? "lessons.html?subject=writing"
            : subject === "speaking"
              ? "lessons.html?subject=speaking"
              : subject === "hanyu3"
                ? "lessons.html?subject=hanyu3"
              : "lessons.html";
      }

      // Set lesson title
      const lesson = getURLParam("lesson") || "01";
      const subject = getURLParam("subject");
      const lessonNumber = String(Number(lesson));
      const listeningLessonTitles = {
        "1": "Bài 01 你学了多长时间汉语了",
        "3": "Bài 03-04 我很想家",
        "5": "Bài 05-06 你也听听吧",
        "7": "Bài 07-08 你吃去哦这个菜吗",
        "9": "Bài 09-10 鸡蛋4块一斤",
        "11": "Bài 11-12 我的手机没电了",
        "13": "Bài 13-14 你怎么了",
        "15": "Bài 15-16 你哪儿也没去",
        "17": "Bài 17-18 买一送一",
        "19": "Bài 19-20 太短了",
        "21": "Bài 21-22 她刚从银行回来",
        "23": "Bài 23-24 很多女人都喜欢逛商场",
      };
      document.getElementById("lessonTitle").textContent =
        subject === "writing" || subject === "speaking"
          || subject === "hanyu3"
          ? `Bài ${lessonNumber}`
          : listeningLessonTitles[lessonNumber] || `Bài ${lesson}`;

      if (subject === "writing") {
        document.getElementById("vocabularyIcon").textContent = "📘";
        document.getElementById("vocabularyTitle").textContent = "Ôn tập bài khóa";
        document.getElementById("vocabularyDesc").textContent =
          "Luyện đọc và hiểu đoạn văn";
        document.getElementById("vocabularyCard").onclick = () => goToContent("vocabulary");

        document.getElementById("listeningIcon").textContent = "📚";
        document.getElementById("listeningTitle").textContent = "Từ mới và cấu trúc";
        document.getElementById("listeningDesc").textContent =
          "Ôn từ/cụm từ và mẫu câu";
        document.getElementById("listeningCard").onclick = () => goToContent("words");

        document.getElementById("structureCard").hidden = true;
        document.getElementById("structureIcon").textContent = "🧩";
        document.getElementById("structureTitle").textContent = "Cấu trúc";
        document.getElementById("structureDesc").textContent =
          "Ôn mẫu câu và cách dùng";
        document.getElementById("structureCard").onclick = () => goToContent("grammar");

        document.getElementById("grammarCard").hidden = false;
        document.getElementById("grammarIcon").textContent = "📝";
        document.getElementById("grammarTitle").textContent = "Kiểm tra cấu trúc";
        document.getElementById("grammarDesc").textContent =
          "Luyện kiểm tra mẫu câu";
        document.getElementById("grammarCard").onclick = () => goToContent("structure");

        document.getElementById("reviewIcon").textContent = "⚡";
        document.getElementById("reviewTitle").textContent = "Luyện theo bài văn 200 chữ";
        document.getElementById("reviewDesc").textContent =
          "Luyện viết theo bài văn";
        document.getElementById("reviewCard").onclick = () => goToContent("example");
        document.getElementById("reviewCard").hidden = false;
      } else if (subject === "speaking") {
        const isLessonFive = lessonNumber === "5";
        document.getElementById("vocabularyIcon").textContent = "📘";
        document.getElementById("vocabularyTitle").textContent = "Ôn tập bài khóa";
        document.getElementById("vocabularyDesc").textContent =
          isLessonFive ? "1 bài kiểm tra - 27 câu/bài" : "1 bài kiểm tra - 25 câu/bài";
        document.getElementById("vocabularyCard").onclick = () => goToContent("vocabulary");

        document.getElementById("listeningIcon").textContent = "📚";
        document.getElementById("listeningTitle").textContent = "Từ mới";
        document.getElementById("listeningDesc").textContent =
          "Học từ mới theo bài";
        document.getElementById("listeningCard").onclick = () => goToContent("words");

        document.getElementById("structureCard").hidden = false;
        document.getElementById("structureIcon").textContent = "🧩";
        document.getElementById("structureTitle").textContent = "Cấu trúc";
        document.getElementById("structureDesc").textContent =
          "Học mẫu câu và ví dụ";
        document.getElementById("structureCard").onclick = () => goToContent("grammar");

        document.getElementById("grammarCard").hidden = false;
        document.getElementById("grammarIcon").textContent = "📝";
        document.getElementById("grammarTitle").textContent = "Kiểm tra cấu trúc";
        document.getElementById("grammarDesc").textContent =
          "Luyện kiểm tra mẫu câu";
        document.getElementById("grammarCard").onclick = () => goToContent("structure");

        document.getElementById("reviewIcon").textContent = "⚡";
        document.getElementById("reviewTitle").textContent = "Kiểm tra phản xạ";
        document.getElementById("reviewDesc").textContent =
          isLessonFive ? "10 bài kiểm tra - 20 câu/bài" : "10 bài kiểm tra - 25 câu/bài";
        document.getElementById("reviewCard").onclick = () => goToContent("example");
        document.getElementById("reviewCard").hidden = false;
      } else if (subject === "hanyu3") {
        document.getElementById("vocabularyIcon").textContent = "📘";
        document.getElementById("vocabularyTitle").textContent = "Ôn tập bài khóa";
        document.getElementById("vocabularyDesc").textContent = "Luyện đọc và hiểu bài khóa";
        document.getElementById("vocabularyCard").onclick = () => goToContent("vocabulary");

        document.getElementById("listeningIcon").textContent = "📚";
        document.getElementById("listeningTitle").textContent = "Từ mới";
        document.getElementById("listeningDesc").textContent = "Học từ mới theo bài";
        document.getElementById("listeningCard").onclick = () => goToContent("words");

        document.getElementById("structureCard").hidden = false;
        document.getElementById("structureIcon").textContent = "🧩";
        document.getElementById("structureTitle").textContent = "Cấu trúc";
        document.getElementById("structureDesc").textContent = "Học mẫu câu và ví dụ";
        document.getElementById("structureCard").onclick = () => goToContent("grammar");

        document.getElementById("grammarCard").hidden = false;
        document.getElementById("grammarIcon").textContent = "📝";
        document.getElementById("grammarTitle").textContent = "Kiểm tra cấu trúc";
        document.getElementById("grammarDesc").textContent = "Luyện kiểm tra mẫu câu";
        document.getElementById("grammarCard").onclick = () => goToContent("structure");

        document.getElementById("reviewIcon").textContent = "⚡";
        document.getElementById("reviewTitle").textContent = "Kiểm tra phản xạ";
        document.getElementById("reviewDesc").textContent = "Luyện phản xạ câu";
        document.getElementById("reviewCard").onclick = () => goToContent("example");
        document.getElementById("reviewCard").hidden = false;

        document.getElementById("exerciseCard").hidden = false;
        document.getElementById("exerciseIcon").textContent = "✍️";
        document.getElementById("exerciseTitle").textContent = "Bài tập";
        document.getElementById("exerciseDesc").textContent = "6 mục bài tập";
        document.getElementById("exerciseCard").onclick = () => goToContent("exercise");
      } else {
        const listeningExampleCounts = {
          "1": "10 bài kiểm tra - 32 câu/bài",
          "3": "13 bài kiểm tra - 20 câu/bài",
          "5": "12 bài kiểm tra - 20 câu/bài",
          "7": "13 bài kiểm tra - 20 câu/bài",
          "9": "15 bài kiểm tra - 20 câu/bài",
          "11": "13 bài kiểm tra - 20 câu/bài",
          "13": "14 bài kiểm tra - 20 câu/bài",
          "15": "16 bài kiểm tra - 20 câu/bài",
          "17": "15 bài kiểm tra - 20 câu/bài",
          "19": "16 bài kiểm tra - 20 câu/bài",
          "21": "15 bài kiểm tra - 20 câu/bài",
          "23": "14 bài kiểm tra - 20 câu/bài",
        };
        document.getElementById("reviewCard").onclick =
          lessonNumber === "1" ? () => goToReview() : () => goToContent("example");
        document.getElementById("reviewDesc").textContent =
          listeningExampleCounts[lessonNumber] || "Chưa có dữ liệu";
        document.getElementById("reviewCard").disabled =
          !listeningExampleCounts[lessonNumber];
      }
    </script>
  </body>
</html>
